<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Погода | Polyrythms</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>🌤 Прогноз погоды</h1>
        <p class="subtitle">Для участников группы</p>
    </header>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Загрузка...</p>
    </div>

    <div id="error" class="error hidden"></div>

    <div id="weather-container" class="weather-container hidden">
        <div class="city-selector">
            <select id="city-select" class="city-select">
                <option value="">Выберите город</option>
            </select>
        </div>

        <div id="current-weather" class="current-weather hidden"></div>

        <div id="forecast" class="forecast hidden">
            <h3>Прогноз на 5 дней</h3>
            <div id="forecast-list" class="forecast-list"></div>
        </div>
    </div>

    <footer>
        <p class="note">Данные предоставлены OpenWeatherMap</p>
    </footer>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/weather.js"></script>
<script src="js/app.js"></script>
</body>
</html>
